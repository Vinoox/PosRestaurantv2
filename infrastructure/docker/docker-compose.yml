services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: posrestaurant_sql

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"

    ports:
      - "1433:1433"

    volumes:
      - sqldata:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped


  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: posrestaurant_rabbitmq

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    ports:
      - "5672:5672"
      - "15672:15672"

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    restart: unless-stopped


  identity-api:
    container_name: posrestaurant_identity_api

    build:
      context: ../..
      dockerfile: src/backend/Services/Identity/Identity.API/Dockerfile

    image: posrestaurant/identity-api:local

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__IdentityConnection: "Server=sqlserver,1433;Database=PosRestaurant_IdentityDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"

      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest

    ports:
      - "5001:8080"

    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    restart: unless-stopped


volumes:
  sqldata: