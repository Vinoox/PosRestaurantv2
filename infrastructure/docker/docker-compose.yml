services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: posrestaurant_sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: posrestaurant_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: posrestaurant-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  identity-api:
    container_name: posrestaurant_identity_api
    build:
      context: ../..
      dockerfile: src/backend/Services/Identity/Identity.API/Dockerfile
    image: posrestaurant/identity-api:local
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityConnection: "Server=sqlserver,1433;Database=PosRestaurant_IdentityDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  catalog-api:
    container_name: posrestaurant_catalog_api
    build:
      context: ../..
      dockerfile: src/backend/Services/Catalog/Catalog.API/Dockerfile
    image: posrestaurant/catalog-api:local
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CatalogConnection: "Server=sqlserver,1433;Database=PosRestaurant_CatalogDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      JwtSettings__Secret: "UYHGfYRDfUYFutrUYFutfRFffUGyuoliGgYFyfTDtucYUTFDf"
      JwtSettings__Issuer: "https://localhost:7001"
      JwtSettings__Audience: "https://localhost:7001"
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ordering-api:
    image: posrestaurant/ordering-api:local
    build:
      context: ../..
      dockerfile: src/backend/Services/Ordering/Ordering.API/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OrderingConnection=Server=sqlserver;Database=PosRestaurant_OrderingDb;User Id=sa;Password=YourStrong@Passw0rd!;TrustServerCertificate=True
      - CatalogApi__BaseUrl=http://catalog-api:8080 
      - JwtSettings__Secret=UYHGfYRDfUYFutrUYFutfRFffUGyuoliGgYFyfTDtucYUTFDf
      - JwtSettings__Issuer=https://localhost:7001
      - JwtSettings__Audience=https://localhost:7001
    depends_on:
      - sqlserver
      - catalog-api

  analytics-api:
    image: posrestaurant/analytics-api:local
    build:
      context: ../..
      dockerfile: src/backend/Services/Analytics/Analytics.API/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDb__ConnectionString=mongodb://mongodb:27017
      - RabbitMq__Host=rabbitmq
      - JwtSettings__Secret=UYHGfYRDfUYFutrUYFutfRFffUGyuoliGgYFyfTDtucYUTFDf
      - JwtSettings__Issuer=https://localhost:7001
      - JwtSettings__Audience=https://localhost:7001
    depends_on:
      - mongodb
      - rabbitmq

  api-gateway:
    image: posrestaurant/api-gateway:local
    build:
      context: ../..
      dockerfile: src/backend/ApiGateway/ApiGateway/Dockerfile
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - identity-api
      - catalog-api
      - ordering-api
      - analytics-api

  frontend:
    image: posrestaurant/frontend:local
    container_name: posrestaurant_frontend
    build:
      context: ../..
      dockerfile: src/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  sqldata:
  mongodb_data: